name: create-artifacts
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: |
          cd frontend
          npm ci
          npm run build

      - run: |
          cd backend
          mkdir -p public
          cp -r ../frontend/dist/* public/
          npm ci
          npm run generate
          npm run build

      - name: Upload backend bundle
        uses: actions/upload-artifact@v4
        with:
          name: backend-bundle
          path: |
            backend/dist
            backend/package.json
            backend/package-lock.json

  package-windows-artifacts:
    runs-on: windows-latest
    needs: build-artifacts

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-bundle
          path: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          cd backend
          npm ci
          npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: backend/binaries